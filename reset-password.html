<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Backtrack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: #16a34a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 20px; font-weight: 700; color: #111827; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p.subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #16a34a; }
    button {
      width: 100%;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
    .message.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .message.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .back { text-align: center; margin-top: 20px; font-size: 13px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎒</div>
      <span class="logo-text">Backtrack</span>
    </div>

    <div id="form-section">
      <h1>New password</h1>
      <p class="subtitle">Enter your new password below.</p>
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat password" />
      <button id="submit-btn" onclick="handleReset()">Update password</button>
      <div id="message" class="message"></div>
    </div>

    <div id="success-section" style="display:none; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">✅</div>
      <h1 style="margin-bottom:8px;">Password updated</h1>
      <p class="subtitle">You can now log in to Backtrack with your new password.</p>
    </div>

    <div id="error-section" style="display:none; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
      <h1 style="margin-bottom:8px;">Invalid link</h1>
      <p class="subtitle">This reset link has expired or is invalid. Please request a new one.</p>
    </div>

    <div class="back">© 2026 Backtrack</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://gvbhfdnihmfiellkmezm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2YmhmZG5paG1maWVsbGttZXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTIyNzcsImV4cCI6MjA5MjA4ODI3N30.fcPqwHoCOfsnYiTDPbfhckvA7u6BsuQttlTo3FY2efg';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Extraire le token depuis le hash de l'URL
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (!accessToken || type !== 'recovery') {
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('error-section').style.display = 'block';
    } else {
      // Établir la session avec le token de récupération
      client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('message');

      msg.className = 'message';
      msg.style.display = 'none';

      if (password.length < 6) {
        msg.className = 'message error';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }
      if (password !== confirm) {
        msg.className = 'message error';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        msg.className = 'message error';
        msg.textContent = error.message || 'An error occurred. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Update password';
      } else {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      }
    }
  </script>
</body>
</html>
